[profile.default]
src = "src"
out = "out"
libs = ["lib"]

# Solidity version
solc_version = "0.8.34"

# Optimizer settings for gas optimization (from PITFALLS.md)
optimizer = true
optimizer_runs = 200

# Enable via-ir for complex contracts
via_ir = false

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
